kind = "web"
previewPath = "/"
title = "Brew & Bite Cafe"
version = "1.0.0"
id = "artifacts/brew-and-bite"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/brew-and-bite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brew-and-bite", "run", "build" ]
serve = "static"
publicDir = "artifacts/brew-and-bite/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
